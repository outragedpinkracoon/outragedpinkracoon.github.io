<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-GB" }}">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <link href='/favicon.ico' rel='icon' />
    <title>{{ page.title }} - {{ site.title }}</title>
    <link rel="stylesheet" href='/assets/css/normalize.css'>
    <link rel="stylesheet" href='/assets/css/code-syntax.css'>
    <link rel="shortcut icon" type="image/png" href="/assets/images/site/favicon.ico">
    <link rel="stylesheet" href='/assets/css/styles.css'>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Fraunces:ital,opsz,wght@1,144,900&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <main>
    <nav aria-label="Main navigation">
      <a href='/' {% if page.url == '/' %}aria-current="page"{% endif %}>Home</a>
      <a href='/about-me' {% if page.url == '/about-me/' or page.url == '/about-me' %}aria-current="page"{% endif %}>Meet Val</a>
      <a href='/coaching' {% if page.url == '/coaching/' or page.url == '/coaching' %}aria-current="page"{% endif %}>Coaching</a>
      <a href='/blog' {% if page.url == '/blog/' or page.url == '/blog' %}aria-current="page"{% endif %}>Blog</a>
      <a href='https://www.linkedin.com/in/outragedpinkracoon/' target='_blank' rel="noopener noreferrer">LinkedIn</a>
      <div class="display-settings">
        <button class="display-settings-toggle" aria-expanded="false" aria-controls="display-settings-panel" aria-label="Display settings">Display</button>
        <div class="display-settings-panel" id="display-settings-panel" role="dialog" aria-label="Display settings">
          <h2>Make it work for you</h2>
          <label>
            <input type="checkbox" id="toggle-reading-mode"> Reading mode
          </label>
          <label>
            <input type="checkbox" id="toggle-cb-red-green"> Red and green look similar to me
          </label>
        </div>
      </div>
    </nav>
    <header><a href='/'>OUTRAGED RACOON COACHING</a></header>
      {% if page.subtitle %}<p class="page-subtitle">{{ page.subtitle }}</p>{% endif %}
    {% if page.show_cta %}<p class="text-center"><a class="header-cta" href="mailto:outragedracooncoaching@gmail.com?subject=Coaching%20Enquiry&body=Hi%20Val%2C%20I%27d%20love%20to%20have%20a%20chat%20about%20coaching.">Book a session</a></p>{% endif %}
    <div id="main-content">
      {{ content }}
    </div>
  </main>
  <footer>
    <p class="footer-copy">&copy; 2026 Outraged Racoon Coaching&reg;</p>
    <nav class="footer-social" aria-label="Social media links">
      <a href="https://www.linkedin.com/in/outragedpinkracoon/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a href="https://www.instagram.com/outragedracoonpaws/" target="_blank" rel="noopener noreferrer">Instagram</a>
      <a href="https://cara.app/outragedracoonpaws" target="_blank" rel="noopener noreferrer">Cara</a>
      <a href="https://stakeholdersbook.substack.com" target="_blank" rel="noopener noreferrer">Substack</a>
    </nav>
  </footer>
  <script>
    (function() {
      var body = document.body;
      var toggleBtn = document.querySelector('.display-settings-toggle');
      var panel = document.getElementById('display-settings-panel');
      var readingCheck = document.getElementById('toggle-reading-mode');
      var cbCheck = document.getElementById('toggle-cb-red-green');

      // Restore saved preferences
      var readingOn = localStorage.getItem('reading-mode') === 'true';
      var cbOn = localStorage.getItem('cb-red-green') === 'true';

      function applyModes() {
        body.classList.toggle('reading-mode', readingOn);
        body.classList.toggle('cb-red-green', cbOn);
        readingCheck.checked = readingOn;
        cbCheck.checked = cbOn;
        toggleBtn.dataset.active = String(readingOn || cbOn);
      }

      applyModes();

      // Panel open/close
      toggleBtn.addEventListener('click', function() {
        var open = panel.classList.toggle('is-open');
        toggleBtn.setAttribute('aria-expanded', String(open));
      });

      // Close on outside click
      document.addEventListener('click', function(e) {
        if (!toggleBtn.contains(e.target) && !panel.contains(e.target)) {
          panel.classList.remove('is-open');
          toggleBtn.setAttribute('aria-expanded', 'false');
        }
      });

      // Close on Escape
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && panel.classList.contains('is-open')) {
          panel.classList.remove('is-open');
          toggleBtn.setAttribute('aria-expanded', 'false');
          toggleBtn.focus();
        }
      });

      // Checkbox listeners
      readingCheck.addEventListener('change', function() {
        readingOn = this.checked;
        localStorage.setItem('reading-mode', readingOn);
        applyModes();
      });

      cbCheck.addEventListener('change', function() {
        cbOn = this.checked;
        localStorage.setItem('cb-red-green', cbOn);
        applyModes();
      });
    })();
  </script>
  <script async defer src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
  <noscript><img src="https://queue.simpleanalyticscdn.com/noscript.gif" alt="" referrerpolicy="no-referrer-when-downgrade" /></noscript>
  </body>
</html>
